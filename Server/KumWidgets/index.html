<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MagicUI Widget Editor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/addon/hint/show-hint.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/addon/hint/show-hint.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/addon/hint/xml-hint.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/addon/edit/closetag.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/addon/edit/matchtags.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/addon/edit/closebrackets.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/addon/fold/xml-fold.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/addon/selection/active-line.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1e1e2e; color: #cdd6f4; height: 100vh; display: flex; flex-direction: column; }
        header { background: #181825; padding: 12px 20px; display: flex; align-items: center; gap: 16px; border-bottom: 1px solid #313244; }
        header h1 { font-size: 18px; font-weight: 600; color: #cba6f7; }
        .user-switch { display: flex; gap: 4px; background: #313244; border-radius: 8px; padding: 3px; }
        .user-switch button { padding: 6px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; background: transparent; color: #a6adc8; transition: all 0.2s; }
        .user-switch button.active { background: #cba6f7; color: #1e1e2e; }
        .user-switch button:hover:not(.active) { color: #cdd6f4; }
        .family-switch { display: flex; gap: 4px; background: #313244; border-radius: 8px; padding: 3px; }
        .family-switch button { padding: 6px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; background: transparent; color: #a6adc8; transition: all 0.2s; }
        .family-switch button.active { background: #89b4fa; color: #1e1e2e; }
        .family-switch button:hover:not(.active) { color: #cdd6f4; }
        .actions { margin-left: auto; display: flex; gap: 8px; }
        .btn-save { padding: 8px 20px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; background: #a6e3a1; color: #1e1e2e; transition: all 0.2s; }
        .btn-save:hover { background: #94e2d5; }
        .btn-save:active { transform: scale(0.97); }
        .status { font-size: 13px; color: #a6adc8; padding: 0 8px; display: flex; align-items: center; }
        .status.saved { color: #a6e3a1; }
        .status.error { color: #f38ba8; }
        main { flex: 1; display: flex; overflow: hidden; }
        .editor-pane { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .pane-header { padding: 8px 16px; background: #181825; font-size: 12px; color: #6c7086; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #313244; }
        .templates-bar { padding: 8px 16px; background: #181825; border-bottom: 1px solid #313244; display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
        .templates-bar span { font-size: 12px; color: #6c7086; text-transform: uppercase; letter-spacing: 1px; margin-right: 4px; }
        .tpl-btn { padding: 4px 10px; border: 1px solid #45475a; border-radius: 6px; background: #313244; color: #bac2de; font-size: 12px; cursor: pointer; transition: all 0.2s; }
        .tpl-btn:hover { background: #45475a; color: #cdd6f4; border-color: #585b70; }
        #editor-container { flex: 1; overflow: hidden; }

        /* CodeMirror 5 dark theme */
        .CodeMirror {
            height: 100%;
            background: #1e1e2e;
            color: #cdd6f4;
            font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
            font-size: 14px;
            line-height: 1.6;
        }
        .CodeMirror-gutters { background: #181825; border-right: 1px solid #313244; }
        .CodeMirror-linenumber { color: #45475a; }
        .CodeMirror-cursor { border-left-color: #cdd6f4; }
        .CodeMirror-selected { background: rgba(137, 180, 250, 0.2); }
        .CodeMirror-activeline-background { background: rgba(69, 71, 90, 0.25); }
        .CodeMirror-activeline-gutter { background: #1e1e2e; }
        .CodeMirror-matchingtag { background: rgba(137, 180, 250, 0.15); }
        .CodeMirror-focused .CodeMirror-selected { background: rgba(137, 180, 250, 0.25); }
        .cm-s-default .cm-tag { color: #89b4fa; font-weight: 600; }
        .cm-s-default .cm-attribute { color: #f9e2af; }
        .cm-s-default .cm-string { color: #a6e3a1; }
        .cm-s-default .cm-comment { color: #6c7086; font-style: italic; }
        .cm-s-default .cm-meta { color: #f38ba8; }
        .cm-s-default .cm-bracket { color: #7f849c; }
        .cm-s-default .cm-error { color: #f38ba8; }

        /* Autocomplete hints */
        .CodeMirror-hints {
            background: #313244 !important;
            border: 1px solid #45475a !important;
            border-radius: 8px !important;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 13px;
            padding: 4px 0;
            z-index: 100;
            max-height: 240px;
            overflow-y: auto;
        }
        .CodeMirror-hint {
            color: #cdd6f4 !important;
            padding: 4px 12px !important;
            border-radius: 4px;
            margin: 0 4px;
        }
        .CodeMirror-hint-active {
            background: #45475a !important;
            color: #cdd6f4 !important;
        }
        .hint-detail {
            color: #6c7086;
            font-style: italic;
            margin-left: 8px;
            font-size: 11px;
        }

        .btn-save-tpl {
            padding: 4px 10px;
            border: 1px solid #a6e3a1;
            border-radius: 6px;
            background: transparent;
            color: #a6e3a1;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            margin-left: auto;
            white-space: nowrap;
        }
        .btn-save-tpl:hover { background: #a6e3a1; color: #1e1e2e; }

        /* ── Save Template modal ── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.6);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: #313244;
            border: 1px solid #45475a;
            border-radius: 14px;
            padding: 24px;
            width: 320px;
            max-width: 90vw;
            box-shadow: 0 8px 32px rgba(0,0,0,.5);
        }
        .modal h3 { font-size: 16px; font-weight: 600; color: #cdd6f4; margin-bottom: 16px; }
        .modal label { font-size: 12px; color: #6c7086; text-transform: uppercase; letter-spacing: .5px; display: block; margin-bottom: 6px; }
        .modal input[type="text"] {
            width: 100%;
            padding: 10px 12px;
            background: #1e1e2e;
            border: 1.5px solid #45475a;
            border-radius: 8px;
            color: #cdd6f4;
            font-size: 14px;
            outline: none;
            margin-bottom: 16px;
        }
        .modal input[type="text"]:focus { border-color: #a6e3a1; }
        .modal-hint { font-size: 11px; color: #6c7086; margin-top: -12px; margin-bottom: 16px; }
        .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
        .modal-actions button {
            padding: 8px 18px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
        }
        .btn-modal-cancel { background: #45475a; color: #cdd6f4; }
        .btn-modal-cancel:hover { background: #585b70; }
        .btn-modal-confirm { background: #a6e3a1; color: #1e1e2e; }
        .btn-modal-confirm:hover { background: #94e2d5; }

        /* ── Mobile responsive ── */
        @media (max-width: 640px) {
            header {
                flex-wrap: wrap;
                gap: 8px;
                padding: 10px 12px;
            }
            header h1 {
                font-size: 15px;
                flex: 1;
            }
            .actions {
                order: -1;
                margin-left: auto;
            }
            .user-switch {
                order: 2;
                flex: 1;
            }
            .family-switch {
                order: 3;
            }
            .user-switch button {
                padding: 7px 14px;
                font-size: 13px;
                min-height: 36px;
            }
            .family-switch button {
                padding: 7px 10px;
                font-size: 13px;
                min-height: 36px;
            }
            .btn-save {
                padding: 8px 16px;
                font-size: 14px;
                min-height: 36px;
            }
            .status {
                display: none;
            }
            .templates-bar {
                padding: 6px 10px;
                gap: 4px;
            }
            .tpl-btn {
                padding: 6px 8px;
                font-size: 11px;
                min-height: 32px;
            }
            .pane-header {
                font-size: 11px;
                padding: 6px 12px;
            }
            .CodeMirror {
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>MagicUI Editor</h1>
        <div class="user-switch">
            <button class="active" data-user="petres">Petres</button>
            <button data-user="lukes">Lukes</button>
        </div>
        <div class="family-switch">
            <button class="active" data-family="systemSmall">Small</button>
            <button data-family="systemMedium">Medium</button>
            <button data-family="systemLarge">Large</button>
        </div>
        <div class="actions">
            <span class="status" id="status"></span>
            <button class="btn-save" id="saveBtn">Save</button>
        </div>
    </header>
    <main>
        <div class="editor-pane">
            <div class="pane-header">XML Widget — <span id="currentLabel">petres / systemSmall</span></div>
            <div class="templates-bar">
                <span>Templates:</span>
                <button class="btn-save-tpl" id="saveTplBtn">＋ Save Template</button>
            </div>

    <!-- Save Template modal -->
    <div class="modal-overlay" id="saveTplModal">
        <div class="modal">
            <h3>💾 Save as Template</h3>
            <label for="tplNameInput">Template name</label>
            <input type="text" id="tplNameInput" placeholder="my-template" maxlength="48" autocomplete="off" spellcheck="false">
            <p class="modal-hint">Letters, numbers and hyphens only.</p>
            <div class="modal-actions">
                <button class="btn-modal-cancel" id="saveTplCancel">Cancel</button>
                <button class="btn-modal-confirm" id="saveTplConfirm">Save</button>
            </div>
        </div>
    </div>
            <div id="editor-container"><textarea id="editor-textarea"></textarea></div>
        </div>
    </main>

    <script>
        // -- MagicUI schema for autocomplete --
        const magicSchema = {
            '!top': ['body'],
            body: { children: ['vstack','hstack','zstack','text','image','button','spacer','divider','list','form','section','toggle','textfield','securefield','picker','stepper','navigationstack','tabview','view','label'] },
            vstack: {
                attrs: { spacing: null, padding: null, alignment: ['leading','center','trailing'], foregroundColor: null, background: null, font: null, fontSize: null, fontWeight: null, 'if': null, frame: null, cornerRadius: null, opacity: null, id: null },
                children: ['vstack','hstack','zstack','text','image','button','spacer','divider','list','form','section','toggle','textfield','securefield','picker','stepper','navigationstack','tabview','view','label']
            },
            hstack: {
                attrs: { spacing: null, padding: null, alignment: ['leading','center','trailing','top','bottom'], foregroundColor: null, background: null, font: null, fontSize: null, fontWeight: null, 'if': null, frame: null, cornerRadius: null, opacity: null, id: null },
                children: ['vstack','hstack','zstack','text','image','button','spacer','divider','list','form','section','toggle','textfield','securefield','picker','stepper','navigationstack','tabview','view','label']
            },
            zstack: {
                attrs: { spacing: null, padding: null, alignment: ['leading','center','trailing','top','bottom'], foregroundColor: null, background: null, 'if': null, frame: null, cornerRadius: null, opacity: null, id: null },
                children: ['vstack','hstack','zstack','text','image','button','spacer','divider','view']
            },
            text: {
                attrs: { font: ['largeTitle','title','title2','title3','headline','subheadline','body','callout','footnote','caption','caption2','system'], fontSize: null, fontWeight: ['ultraLight','thin','light','regular','medium','semibold','bold','heavy','black'], foregroundColor: ['white','black','red','orange','yellow','green','blue','purple','pink','cyan','gray','secondary','primary'], background: null, 'if': null, padding: null, frame: null, opacity: null, strikethrough: ['true','false'], navigationTitle: null, id: null },
                children: []
            },
            image: {
                attrs: { systemName: null, foregroundColor: ['white','black','red','orange','yellow','green','blue','purple','pink','cyan','gray','secondary','primary'], font: ['largeTitle','title','title2','title3','headline','subheadline','body','callout','footnote','caption','caption2','system'], fontSize: null, 'if': null, padding: null, frame: null, opacity: null, resizable: ['true','false'], id: null },
                children: []
            },
            button: {
                attrs: { action: null, foregroundColor: ['white','black','red','orange','yellow','green','blue','purple','pink','cyan','gray','secondary','primary'], font: null, fontSize: null, fontWeight: null, background: null, 'if': null, padding: null, frame: null, cornerRadius: null, opacity: null, id: null },
                children: []
            },
            spacer: { attrs: { 'if': null }, children: [] },
            divider: { attrs: { 'if': null, foregroundColor: null, padding: null }, children: [] },
            list: {
                attrs: { navigationTitle: null, padding: null, 'if': null, id: null },
                children: ['vstack','hstack','zstack','text','image','button','spacer','divider','section','view']
            },
            form: {
                attrs: { navigationTitle: null, padding: null, 'if': null, id: null },
                children: ['section','toggle','textfield','securefield','picker','stepper','button','text','divider','view']
            },
            section: {
                attrs: { header: null, 'if': null },
                children: ['toggle','textfield','securefield','picker','stepper','button','text','divider','view']
            },
            toggle: {
                attrs: { key: null, value: ['true','false'], foregroundColor: null, 'if': null, id: null },
                children: []
            },
            textfield: {
                attrs: { key: null, value: null, foregroundColor: null, 'if': null, id: null },
                children: []
            },
            securefield: {
                attrs: { key: null, value: null, foregroundColor: null, 'if': null, id: null },
                children: []
            },
            picker: {
                attrs: { key: null, value: null, title: null, foregroundColor: null, 'if': null, id: null },
                children: ['label']
            },
            stepper: {
                attrs: { key: null, value: null, 'in': null, foregroundColor: null, 'if': null, id: null },
                children: []
            },
            label: {
                attrs: { tag: null, 'if': null },
                children: []
            },
            navigationstack: {
                attrs: { navigationTitle: null, tabItem: null, tag: null, 'if': null, id: null },
                children: ['vstack','hstack','zstack','text','image','button','spacer','divider','list','form','section','view']
            },
            tabview: {
                attrs: { key: null, value: null, 'if': null, id: null },
                children: ['navigationstack','vstack','hstack','zstack','view']
            },
            view: {
                attrs: { id: null, src: null, 'if': null },
                children: ['vstack','hstack','zstack','text','image','button','spacer','divider','list','form','section','toggle','textfield','securefield','picker','stepper','navigationstack','tabview','view']
            }
        };

        // Convert schema to CodeMirror xml-hint format
        function buildCMSchema() {
            const s = {};
            for (const [tag, def] of Object.entries(magicSchema)) {
                if (tag === '!top') continue;
                s[tag] = { attrs: {}, children: def.children || [] };
                if (def.attrs) {
                    for (const [attr, vals] of Object.entries(def.attrs)) {
                        s[tag].attrs[attr] = vals;
                    }
                }
            }
            s['!top'] = magicSchema['!top'];
            return s;
        }

        const cmSchema = buildCMSchema();

        // Initialize CodeMirror
        const cm = CodeMirror.fromTextArea(document.getElementById('editor-textarea'), {
            mode: 'xml',
            lineNumbers: true,
            autoCloseTags: true,
            matchTags: { bothTags: true },
            autoCloseBrackets: true,
            styleActiveLine: true,
            indentUnit: 4,
            tabSize: 4,
            indentWithTabs: false,
            lineWrapping: false,
            extraKeys: {
                'Ctrl-Space': function(cm) { CodeMirror.showHint(cm, CodeMirror.hint.xml, { schemaInfo: cmSchema }); },
                'Cmd-S': function() { saveContent(); return false; },
                'Ctrl-S': function() { saveContent(); return false; },
                "'<'": function(cm) {
                    // Insert < then trigger hint
                    cm.replaceSelection('<');
                    CodeMirror.showHint(cm, CodeMirror.hint.xml, { schemaInfo: cmSchema, completeSingle: false });
                },
                "' '": function(cm) {
                    // Insert space then maybe trigger attr hint if inside a tag
                    var cur = cm.getCursor();
                    var token = cm.getTokenAt(cur);
                    cm.replaceSelection(' ');
                    // If we're inside a tag, trigger hint
                    var state = cm.getTokenAt(cm.getCursor()).state;
                    if (state && state.tagName) {
                        setTimeout(function() {
                            CodeMirror.showHint(cm, CodeMirror.hint.xml, { schemaInfo: cmSchema, completeSingle: false });
                        }, 50);
                    }
                },
                Tab: function(cm) {
                    if (cm.somethingSelected()) {
                        cm.indentSelection('add');
                    } else {
                        cm.replaceSelection('    ');
                    }
                }
            }
        });

        // Fill editor container
        cm.setSize('100%', '100%');

        // -- App state --
        const statusEl = document.getElementById('status');
        const saveBtn = document.getElementById('saveBtn');
        const currentLabel = document.getElementById('currentLabel');

        let currentUser = 'petres';
        let currentFamily = 'systemSmall';
        const cache = {};

        function cacheKey() { return currentUser + '_' + currentFamily; }
        function updateLabel() { currentLabel.textContent = currentUser + ' / ' + currentFamily; }

        function setStatus(msg, type) {
            statusEl.textContent = msg;
            statusEl.className = 'status ' + (type || '');
            if (type === 'saved') setTimeout(function() { statusEl.textContent = ''; statusEl.className = 'status'; }, 3000);
        }

        function getContent() { return cm.getValue(); }
        function setContent(text) { cm.setValue(text); }

        cm.on('change', function() {
            cache[cacheKey()] = getContent();
        });

        async function loadContent() {
            var key = cacheKey();
            if (cache[key] !== undefined) {
                setContent(cache[key]);
                updateLabel();
                return;
            }
            updateLabel();
            try {
                var res = await fetch('api.php?action=load&user=' + currentUser + '&family=' + currentFamily);
                var data = await res.json();
                if (data.success) {
                    setContent(data.content);
                    cache[key] = data.content;
                } else {
                    setContent('');
                    cache[key] = '';
                    setStatus(data.error || 'No content yet', '');
                }
            } catch (e) {
                setStatus('Failed to load', 'error');
                setContent('');
            }
        }

        async function saveContent() {
            setStatus('Saving...', '');
            try {
                var res = await fetch('api.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'save',
                        user: currentUser,
                        family: currentFamily,
                        content: getContent()
                    })
                });
                var data = await res.json();
                if (data.success) {
                    cache[cacheKey()] = getContent();
                    setStatus('Saved!', 'saved');
                } else {
                    setStatus(data.error || 'Save failed', 'error');
                }
            } catch (e) {
                setStatus('Save failed', 'error');
            }
        }

        // -- Templates --
        const familySuffix = {
            systemSmall: 'small',
            systemMedium: 'medium',
            systemLarge: 'large'
        };

        function formatTemplateName(name) {
            return name.replace(/[-_]/g, ' ')
                       .replace(/\b\w/g, c => c.toUpperCase());
        }

        async function loadTemplate(name, family) {
            const suffix = familySuffix[family] || 'small';
            const url = 'Templates/' + name + '_' + suffix + '.xml';
            const res = await fetch(url);
            if (!res.ok) throw new Error('Template not found: ' + url);
            return res.text();
        }

        async function refreshTemplateBar() {
            const bar       = document.querySelector('.templates-bar');
            const saveBtn   = document.getElementById('saveTplBtn');
            // Remove existing template buttons, keep the label and Save button
            bar.querySelectorAll('.tpl-btn').forEach(b => b.remove());

            try {
                const res = await fetch('api.php?action=list_templates&family=' + encodeURIComponent(currentFamily));
                const data = await res.json();
                if (!data.success) return;

                data.templates.forEach(function(name) {
                    const btn = document.createElement('button');
                    btn.className = 'tpl-btn';
                    btn.dataset.tpl = name;
                    btn.textContent = formatTemplateName(name);
                    btn.addEventListener('click', async function() {
                        try {
                            const xml = await loadTemplate(name, currentFamily);
                            setContent(xml);
                            cache[cacheKey()] = xml;
                        } catch (e) {
                            setStatus('Template load failed', 'error');
                        }
                    });
                    bar.insertBefore(btn, saveBtn);
                });
            } catch (e) {
                setStatus('Could not load templates list', 'error');
            }
        }

        // -- Save Template modal --
        const saveTplModal   = document.getElementById('saveTplModal');
        const tplNameInput   = document.getElementById('tplNameInput');
        const saveTplConfirm = document.getElementById('saveTplConfirm');

        document.getElementById('saveTplBtn').addEventListener('click', function() {
            tplNameInput.value = '';
            saveTplModal.classList.add('open');
            tplNameInput.focus();
        });

        document.getElementById('saveTplCancel').addEventListener('click', function() {
            saveTplModal.classList.remove('open');
        });

        saveTplModal.addEventListener('click', function(e) {
            if (e.target === saveTplModal) saveTplModal.classList.remove('open');
        });

        tplNameInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') saveTplConfirm.click();
            if (e.key === 'Escape') saveTplModal.classList.remove('open');
        });

        saveTplConfirm.addEventListener('click', async function() {
            const rawName = tplNameInput.value.trim();
            if (!rawName) { tplNameInput.focus(); return; }

            saveTplConfirm.disabled = true;
            saveTplConfirm.textContent = 'Saving…';

            try {
                const res = await fetch('api.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action:  'save_template',
                        family:  currentFamily,
                        name:    rawName,
                        content: getContent()
                    })
                });
                const data = await res.json();
                if (data.success) {
                    saveTplModal.classList.remove('open');
                    setStatus('Template "' + data.name + '" saved!', 'saved');
                    await refreshTemplateBar();
                } else {
                    setStatus(data.error || 'Save failed', 'error');
                }
            } catch (e) {
                setStatus('Save failed', 'error');
            } finally {
                saveTplConfirm.disabled = false;
                saveTplConfirm.textContent = 'Save';
            }
        });

        // User switch
        document.querySelectorAll('.user-switch button').forEach(function(btn) {
            btn.addEventListener('click', function() {
                cache[cacheKey()] = getContent();
                document.querySelectorAll('.user-switch button').forEach(function(b) { b.classList.remove('active'); });
                btn.classList.add('active');
                currentUser = btn.dataset.user;
                loadContent();
            });
        });

        // Family switch
        document.querySelectorAll('.family-switch button').forEach(function(btn) {
            btn.addEventListener('click', function() {
                cache[cacheKey()] = getContent();
                document.querySelectorAll('.family-switch button').forEach(function(b) { b.classList.remove('active'); });
                btn.classList.add('active');
                currentFamily = btn.dataset.family;
                refreshTemplateBar();
                loadContent();
            });
        });

        // Save button
        saveBtn.addEventListener('click', saveContent);

        // Initial load
        refreshTemplateBar();
        loadContent();
    </script>
</body>
</html>
